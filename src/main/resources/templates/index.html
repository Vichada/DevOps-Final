<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>ID Card Management Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2 class="mb-4">ID Card Registration Dashboard</h2>
    
    <div class="card p-4 mb-5 shadow-sm">
        <h4>Register New Profile</h4>
        <form action="/api/profiles" method="POST" enctype="multipart/form-data" class="row g-3 mt-2">
            <div class="col-md-4">
                <label class="form-label">Full Name</label>
                <input type="text" name="fullName" class="form-control" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Department</label>
                <input type="text" name="department" class="form-control" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Profile Type</label>
                <select name="profileType" class="form-select">
                    <option value="STUDENT">STUDENT</option>
                    <option value="EMPLOYEE">EMPLOYEE</option>
                    <option value="USER">USER</option>
                </select>
            </div>
            <div class="col-md-12">
                <label class="form-label">Profile Picture (JPEG/PNG)</label>
                <input type="file" name="photo" class="form-control" accept="image/*">
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-primary">Save Profile & Generate Code</button>
            </div>
        </form>
    </div>

    <div class="d-flex justify-content-between align-items-center mt-4">
        <h4>Registered Records</h4>
        <a href="/api/profiles/export/batch" class="btn btn-success shadow-sm">
            📥 Download All ID Cards (Batch PDF)
        </a>
    </div>
    <table class="table table-striped table-hover mt-3">
        <thead class="table-dark">
            <tr>
                <th>Reg Number</th>
                <th>Name</th>
                <th>Department</th>
                <th>Type</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${profiles}">
                <td th:text="${p.registrationNumber}"></td>
                <td th:text="${p.fullName}"></td>
                <td th:text="${p.department}"></td>
                <td th:text="${p.type}"></td>
                <td>
                    <a th:href="@{'/preview/' + ${p.id}}" class="btn btn-sm btn-info text-white">Live Preview</a>
                    <a th:href="@{'/api/profiles/' + ${p.id} + '/export'}" class="btn btn-sm btn-success">Download PDF</a>
                    
                    <button class="btn btn-sm btn-warning text-white edit-btn"
                            th:data-id="${p.id}"
                            th:data-name="${p.fullName}"
                            th:data-dept="${p.department}"
                            th:data-type="${p.type}">
                        Edit
                    </button>
                    
                    <a th:href="@{'/api/profiles/delete/' + ${p.id}}" class="btn btn-sm btn-danger" 
                    onclick="return confirm('Are you sure you want to delete this profile?')">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <form id="editForm" method="POST" action="/api/profiles/update">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Update Profile Data</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" name="id" id="editId">
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" name="fullName" id="editName" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Department</label>
                            <input type="text" name="department" id="editDept" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Profile Type</label>
                            <select name="profileType" id="editType" class="form-select">
                                <option value="STUDENT">STUDENT</option>
                                <option value="EMPLOYEE">EMPLOYEE</option>
                                <option value="USER">USER</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-warning text-white">Save Changes</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Find all edit buttons on the page
            const editButtons = document.querySelectorAll('.edit-btn');
            
            editButtons.forEach(button => {
                button.addEventListener('click', function() {
                    // Read the safe HTML5 data values
                    const id = this.getAttribute('data-id');
                    const name = this.getAttribute('data-name');
                    const dept = this.getAttribute('data-dept');
                    const type = this.getAttribute('data-type');
                    
                    // Inject them straight into the modal input form fields
                    document.getElementById('editId').value = id;
                    document.getElementById('editName').value = name;
                    document.getElementById('editDept').value = dept;
                    document.getElementById('editType').value = type;
                    
                    // Toggle and show the Bootstrap modal safely
                    new bootstrap.Modal(document.getElementById('editModal')).show();
                });
            });
        });
    </script>
    </table>
</body>
</html>
